async function checkSupabaseConnection() {
  var gr=document.getElementById("group").value;
  var pas=document.getElementById("password").value;
  // Пробуем прочитать 1 строку из любой вашей таблицы (замените 'posts' на имя вашей таблицы)

  localStorage.setItem("group",gr)
  if (!data || data.length === 0) {
    alert("Ошибка")
  }
  else{
   CreateScheldure(gr)
  }
  
}

async function Monday(){

        var b=document.getElementById("container")
